name: PR Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Robolectric Android JARs
        uses: actions/cache@v4
        with:
          path: ~/.robolectric
          key: robolectric-${{ hashFiles('**/*.gradle*') }}
          restore-keys: robolectric-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit and Robolectric integration tests
        run: ./gradlew test --stacktrace

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/**/*.xml'
          check_name: 'Test Results'
          fail_on_failure: true

      # Uncomment to run on a real device (requires emulator or connected device):
      # - name: Run instrumented tests
      #   run: ./gradlew connectedAndroidTest
