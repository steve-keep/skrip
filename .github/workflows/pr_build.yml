name: PR Build

on:
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Robolectric Android JARs
        uses: actions/cache@v4
        with:
          path: ~/.robolectric
          key: robolectric-${{ hashFiles('**/*.gradle*') }}
          restore-keys: robolectric-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit and Robolectric integration tests with coverage
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification --stacktrace || exit 1

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/**/*.xml'
          check_name: 'Test Results'
          fail_on_failure: true

      - name: Add coverage report to PR
        id: jacoco
        uses: Madrapps/jacoco-report@v1.6.1
        if: always()
        with:
          paths: |
            ${{ github.workspace }}/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml,
            ${{ github.workspace }}/core/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0.0
          title: Code Coverage

      - name: Fail PR if changed files coverage is less than 70%
        if: ${{ steps.jacoco.outputs.coverage-changed-files != '' && steps.jacoco.outputs.coverage-changed-files < 0.0 }}
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('Changed files coverage is less than 70%!')

      # Uncomment to run on a real device (requires emulator or connected device):
      # - name: Run instrumented tests
      #   run: ./gradlew connectedAndroidTest
