name: Main Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set Version
        id: version
        run: |
          VERSION_NAME="1.0.${{ github.run_number }}"
          VERSION_CODE=${{ github.run_number }}
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        env:
          OTLP_ENDPOINT: ${{ secrets.OTLP_ENDPOINT }}
          OTLP_AUTH_TOKEN: ${{ secrets.OTLP_AUTH_TOKEN }}
        run: ./gradlew assembleDebug -PversionCode=${{ steps.version.outputs.version_code }} -PversionName=${{ steps.version.outputs.version_name }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: Release ${{ steps.version.outputs.version_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: app/build/outputs/apk/debug/*.apk
